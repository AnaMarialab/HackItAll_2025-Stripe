<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Căutare firme haine & meșteșuguri</title>

    <!-- Bootstrap (doar pentru stil, prin CDN) -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >

    <style>
        body {
            padding-top: 40px;
            background-color: #f5f5f5;
        }
        .card {
            border-radius: 16px;
        }
        #resultsTable tbody tr:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card shadow-sm">
                <div class="card-body">
                    <h3 class="card-title mb-3 text-center">
                        Căutare firme de haine și meșteșuguri
                    </h3>
                    <p class="text-muted text-center">
                        Scrie un articol (ex: <em>rochie elegantă</em>, <em>cercei handmade</em>) și aplicația va
                        căuta firme din București care se potrivesc.
                    </p>

                    <form id="searchForm" class="mb-3">
                        <div class="mb-3">
                            <label for="articol" class="form-label">Articol căutat</label>
                            <input type="text" id="articol" class="form-control"
                                   placeholder="Ex: rochie de seară, blugi, brățară handmade" required>
                        </div>

                        <!-- viitor: poți adăuga aici și raza de 8 km, dacă implementezi partea de hartă -->

                        <button type="submit" class="btn btn-primary w-100">
                            Caută firme
                        </button>
                    </form>

                    <div id="status" class="small text-muted"></div>

                    <div class="table-responsive mt-3">
                        <table class="table table-sm table-striped" id="resultsTable">
                            <thead>
                            <tr>
                                <th>#</th>
                                <th>Denumire firmă</th>
                                <th>CUI</th>
                                <th>CAEN</th>
                            </tr>
                            </thead>
                            <tbody>
                            <!-- rândurile vor fi adăugate din JavaScript -->
                            </tbody>
                        </table>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const form = document.getElementById('searchForm');
    const articolInput = document.getElementById('articol');
    const statusDiv = document.getElementById('status');
    const resultsBody = document.querySelector('#resultsTable tbody');

    form.addEventListener('submit', function (e) {
        e.preventDefault();
        const articol = articolInput.value.trim();
        if (!articol) {
            return;
        }

        // curăț rezultate vechi
        resultsBody.innerHTML = '';
        statusDiv.textContent = 'Caut firme...';

        const url = `/api/search?articol=${encodeURIComponent(articol)}`;

        fetch(url)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Eroare la apelul API');
                }
                return response.json();
            })
            .then(data => {
                if (!Array.isArray(data) || data.length === 0) {
                    statusDiv.textContent = 'Nu am găsit firme pentru criteriul introdus.';
                    return;
                }

                statusDiv.textContent = `Am găsit ${data.length} firm(e).`;

                data.forEach((firma, index) => {
                    const tr = document.createElement('tr');

                    const tdIndex = document.createElement('td');
                    tdIndex.textContent = index + 1;
                    tr.appendChild(tdIndex);

                    const tdNume = document.createElement('td');
                    tdNume.textContent = firma.nume || firma.denumire || '';
                    tr.appendChild(tdNume);

                    const tdCui = document.createElement('td');
                    tdCui.textContent = firma.cui || '';
                    tr.appendChild(tdCui);

                    const tdCaen = document.createElement('td');
                    tdCaen.textContent = firma.caen || '';
                    tr.appendChild(tdCaen);

                    resultsBody.appendChild(tr);
                });
            })
            .catch(err => {
                console.error(err);
                statusDiv.textContent = 'A apărut o eroare la căutare.';
            });
    });
</script>

</body>
</html>
